<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Todo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    input, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    button { cursor: pointer; }
    .muted { color: #666; font-size: 14px; }
    ul { list-style: none; padding: 0; margin: 10px 0 0; }
    li { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
    li:last-child { border-bottom: none; }
    .task { flex: 1; }
    .task.done { text-decoration: line-through; color: #666; }
    .right { display: flex; gap: 8px; }
    .msg { white-space: pre-wrap; }
    .top { display:flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    a { color: inherit; }
  </style>
</head>
<body>
  <div class="top">
    <h2 style="margin:0;">Todo</h2>
    <div class="muted">API: <a href="/docs" target="_blank">/docs</a></div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Регистрация / Вход</h3>
    <div class="row">
      <input id="username" placeholder="username" autocomplete="username" />
      <input id="password" placeholder="password" type="password" autocomplete="current-password" />
      <button onclick="registerUser()">Register</button>
      <button onclick="loginUser()">Login</button>
      <button onclick="logoutUser()">Logout</button>
    </div>
    <div class="muted">Токен хранится в браузере (localStorage).</div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Задачи</h3>
    <div class="row">
      <input id="task" placeholder="Новая задача..." style="flex:1; min-width: 240px;" />
      <button onclick="addTask()">Add</button>
      <button onclick="loadTasks()">Refresh</button>
      <button onclick="loadPending()">Pending</button>
    </div>
    <ul id="tasks"></ul>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Лог</h3>
    <div id="msg" class="msg muted"></div>
  </div>

<script>
  const tasksEl = document.getElementById("tasks");
  const msgEl = document.getElementById("msg");

  function log(s) { msgEl.textContent = String(s); }

  function getToken() { return localStorage.getItem("token") || ""; }
  function setToken(t) { localStorage.setItem("token", t); }

  function headersAuth(extra = {}) {
    const t = getToken();
    const h = { ...extra };
    if (t) h["Authorization"] = "Bearer " + t;
    return h;
  }

  async function api(path, options = {}) {
    const res = await fetch(path, options);
    const text = await res.text();
    let data;
    try { data = text ? JSON.parse(text) : null; } catch { data = text; }

    if (!res.ok) {
      const detail = (data && data.detail) ? data.detail : text;
      throw new Error(res.status + " " + res.statusText + "\n" + detail);
    }
    return data;
  }

  async function registerUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (!username || !password) return log("Введите username и password");

    try {
      const out = await api("/auth/register", {
        method: "POST",
        headers: headersAuth({ "Content-Type": "application/json" }),
        body: JSON.stringify({ username, password })
      });
      log("Registered: " + JSON.stringify(out));
    } catch (e) {
      log(e.message);
    }
  }

  async function loginUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (!username || !password) return log("Введите username и password");

    try {
      const out = await api("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      setToken(out.access_token);
      log("Login OK. Token saved.");
      await loadTasks();
    } catch (e) {
      log(e.message);
    }
  }

  async function logoutUser() {
    const hadToken = !!getToken();
    try {
      if (hadToken) {
        await api("/auth/logout", {
          method: "POST",
          headers: headersAuth()
        });
      }
    } catch (e) {
      // If token already expired/invalid, just clear local state.
    } finally {
      localStorage.removeItem("token");
      tasksEl.innerHTML = "";
      log("Logged out. Token removed.");
    }
  }

  function render(list) {
    tasksEl.innerHTML = "";

    for (const t of list) {
      const li = document.createElement("li");

      const text = document.createElement("div");
      text.className = "task" + (t.done ? " done" : "");
      text.textContent = `#${t.id} — ${t.task}`;

      const right = document.createElement("div");
      right.className = "right";

      const btnDone = document.createElement("button");
      btnDone.textContent = t.done ? "Undone" : "Done";
      btnDone.onclick = () => setDone(t.id, !t.done);

      const btnDel = document.createElement("button");
      btnDel.textContent = "Delete";
      btnDel.onclick = () => deleteTask(t.id);

      right.appendChild(btnDone);
      right.appendChild(btnDel);

      li.appendChild(text);
      li.appendChild(right);
      tasksEl.appendChild(li);
    }
  }

  async function loadTasks() {
    try {
      const list = await api("/tasks", { headers: headersAuth() });
      render(list);
      log("Loaded tasks: " + list.length);
    } catch (e) {
      log(e.message);
    }
  }

  async function loadPending() {
    try {
      const list = await api("/tasks/pending", { headers: headersAuth() });
      render(list);
      log("Loaded pending: " + list.length);
    } catch (e) {
      log(e.message);
    }
  }

  async function addTask() {
    const task = document.getElementById("task").value.trim();
    if (!task) return log("Пустая задача");

    try {
      await api("/tasks", {
        method: "POST",
        headers: headersAuth({ "Content-Type": "application/json" }),
        body: JSON.stringify({ task })
      });
      document.getElementById("task").value = "";
      await loadTasks();
    } catch (e) {
      log(e.message);
    }
  }

  async function setDone(id, done) {
    try {
      await api(`/tasks/${id}`, {
        method: "PATCH",
        headers: headersAuth({ "Content-Type": "application/json" }),
        body: JSON.stringify({ done })
      });
      await loadTasks();
    } catch (e) {
      log(e.message);
    }
  }

  async function deleteTask(id) {
    try {
      await api(`/tasks/${id}`, {
        method: "DELETE",
        headers: headersAuth()
      });
      await loadTasks();
    } catch (e) {
      log(e.message);
    }
  }
</script>
</body>
</html>
